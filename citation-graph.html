<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMMORTALIS v5.3 — Citation Graph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#020408;--panel:#030810;--border:#0a1a2a;--cyan:#00e5ff;--green:#00ff88;--yellow:#ffcc00;--red:#ff3366;--blue:#0088ff;--text:#a0c8e0;--bright:#e0f4ff;--dim:#0a2030;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#000810,var(--bg));}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:.9rem;letter-spacing:.25em;color:var(--blue);text-shadow:0 0 30px rgba(0,136,255,.6);}
.logo em{color:var(--cyan);font-style:normal;}
.hdr-right{font-size:.65rem;color:#334;display:flex;gap:16px;align-items:center;}
.layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 53px);}
.left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:16px;}
.section-title{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:.3em;color:var(--blue);opacity:.8;margin-bottom:10px;}
.field{margin-bottom:8px;}
.field label{display:block;font-size:.6rem;color:#456;margin-bottom:3px;}
.field input,.field select{width:100%;background:var(--dim);border:1px solid var(--border);color:var(--bright);font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:7px 10px;outline:none;}
.field input:focus{border-color:var(--blue);}
.btn{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.15em;padding:10px 16px;border:1px solid currentColor;cursor:pointer;background:transparent;width:100%;margin-bottom:6px;text-transform:uppercase;transition:all .15s;}
.btn-blue{color:var(--blue);}
.btn-blue:hover:not(:disabled){background:rgba(0,136,255,.08);box-shadow:0 0 20px rgba(0,136,255,.2);}
.btn-cyan{color:var(--cyan);}
.btn-cyan:hover:not(:disabled){background:rgba(0,229,255,.08);}
.btn:disabled{opacity:.25;cursor:not-allowed;}
.sep{height:1px;background:var(--border);margin:12px 0;}
.paper-list{max-height:300px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--dim) transparent;}
.paper-item{border:1px solid var(--border);padding:8px;margin-bottom:6px;cursor:pointer;background:var(--panel);transition:all .15s;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.paper-item:hover{border-color:var(--blue);}
.paper-item.selected{border-color:var(--cyan);background:rgba(0,229,255,.03);}
.paper-item .pi-title{font-size:.68rem;color:var(--bright);line-height:1.4;margin-bottom:3px;}
.paper-item .pi-meta{font-size:.58rem;color:#456;}
.pi-badge{display:inline-block;font-size:.5rem;padding:1px 5px;border:1px solid;margin-top:3px;}
.pi-badge.high{color:var(--red);border-color:var(--red);background:rgba(255,51,102,.05);}
.pi-badge.med{color:var(--yellow);border-color:var(--yellow);background:rgba(255,204,0,.05);}
.pi-badge.low{color:var(--blue);border-color:var(--blue);background:rgba(0,136,255,.05);}
.insight-box{border:1px solid var(--blue);padding:10px;background:rgba(0,136,255,.03);margin-top:8px;}
.insight-box .ib-title{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:.2em;color:var(--blue);margin-bottom:6px;}
.insight-box .ib-item{font-size:.65rem;line-height:1.5;padding:3px 0;border-bottom:1px solid var(--border);color:var(--text);}
.insight-box .ib-item:last-child{border-bottom:none;}
.ib-item .ib-score{color:var(--cyan);font-family:'Orbitron',monospace;font-size:.6rem;}
canvas{display:block;}
#graphCanvas{cursor:grab;}
#graphCanvas:active{cursor:grabbing;}
.graph-controls{position:absolute;bottom:20px;right:20px;display:flex;gap:6px;}
.graph-btn{font-family:'Orbitron',monospace;font-size:.55rem;padding:6px 10px;border:1px solid var(--border);color:#456;background:var(--panel);cursor:pointer;transition:all .15s;}
.graph-btn:hover{border-color:var(--blue);color:var(--blue);}
.tooltip{position:absolute;background:var(--panel);border:1px solid var(--blue);padding:8px 12px;font-size:.65rem;max-width:280px;pointer-events:none;display:none;z-index:100;line-height:1.5;}
.tooltip .tt-title{color:var(--bright);margin-bottom:3px;}
.tooltip .tt-meta{color:#456;font-size:.6rem;}
.loading-overlay{position:absolute;inset:0;background:rgba(2,4,8,.8);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:50;}
.loading-overlay.hidden{display:none;}
.loading-text{font-family:'Orbitron',monospace;font-size:.7rem;color:var(--blue);letter-spacing:.2em;}
.loading-bar{width:200px;height:2px;background:var(--dim);}
.loading-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));width:0%;transition:width .3s;}
.graph-wrap{position:relative;flex:1;}
</style>
</head>
<body>
<header>
  <div class="logo">IMMORTALIS <em>v5.3</em> // CITATION GRAPH</div>
  <div class="hdr-right">
    <span id="graphStats">Nodes: 0 | Edges: 0</span>
    <span id="hdrClock">00:00:00</span>
  </div>
</header>
<div class="layout">
  <div class="left">
    <div class="section-title">// GRAPH SEED</div>
    <div class="field">
      <label>SEARCH QUERY</label>
      <input type="text" id="queryInput" placeholder="senolytics aging reversal 2025" value="senolytics aging reversal" />
    </div>
    <div class="field">
      <label>DEPTH (1=direct, 2=citations of citations)</label>
      <select id="depthSelect">
        <option value="1">1 — Direct citations</option>
        <option value="2" selected>2 — Extended graph</option>
      </select>
    </div>
    <div class="field">
      <label>MAX PAPERS</label>
      <select id="maxPapers">
        <option value="10">10 papers</option>
        <option value="20" selected>20 papers</option>
        <option value="30">30 papers</option>
      </select>
    </div>
    <button class="btn btn-blue" id="buildBtn" onclick="buildGraph()">▶ BUILD CITATION GRAPH</button>
    <button class="btn btn-cyan" onclick="findUnchallenged()">★ FIND UNCHALLENGED CLAIMS</button>

    <div class="sep"></div>
    <div class="section-title">// PAPER LIST</div>
    <div class="paper-list" id="paperList"><div style="color:#234;font-size:.65rem;">Run a search to populate</div></div>

    <div class="sep"></div>
    <div class="section-title">// TOP INSIGHTS</div>
    <div class="insight-box">
      <div class="ib-title">MOST IMPACTFUL UNCHALLENGED</div>
      <div id="insightList"><div class="ib-item" style="color:#234;">—</div></div>
    </div>
  </div>

  <div class="graph-wrap" id="graphWrap">
    <canvas id="graphCanvas"></canvas>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-text" id="loadingText">INITIALIZING</div>
      <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
    </div>
    <div class="graph-controls">
      <div class="graph-btn" onclick="resetZoom()">RESET</div>
      <div class="graph-btn" onclick="zoomIn()">+ ZOOM</div>
      <div class="graph-btn" onclick="zoomOut()">- ZOOM</div>
    </div>
    <div class="tooltip" id="tooltip"></div>
  </div>
</div>

<script>
setInterval(() => { document.getElementById('hdrClock').textContent = new Date().toTimeString().slice(0,8); }, 1000);

// ── Graph state ──
let nodes = [];
let edges = [];
let scale = 1;
let offsetX = 0;
let offsetY = 0;
let dragging = false;
let dragStart = { x: 0, y: 0 };
let hoveredNode = null;
let animFrame = null;

const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('graphWrap');
  canvas.width = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
  draw();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function setLoading(text, pct) {
  const overlay = document.getElementById('loadingOverlay');
  if (pct >= 100) { overlay.classList.add('hidden'); return; }
  overlay.classList.remove('hidden');
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingFill').style.width = pct + '%';
}

// ── Semantic Scholar API ──
async function ssSearch(query, limit = 20) {
  const url = `https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(query)}&limit=${limit}&fields=paperId,title,year,citationCount,referenceCount,authors,abstract,isOpenAccess,externalIds`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Semantic Scholar API error');
  return res.json();
}

async function ssGetReferences(paperId, limit = 10) {
  try {
    const url = `https://api.semanticscholar.org/graph/v1/paper/${paperId}/references?limit=${limit}&fields=paperId,title,year,citationCount,authors`;
    const res = await fetch(url);
    if (!res.ok) return { data: [] };
    return res.json();
  } catch(e) { return { data: [] }; }
}

async function ssGetCitations(paperId, limit = 10) {
  try {
    const url = `https://api.semanticscholar.org/graph/v1/paper/${paperId}/citations?limit=${limit}&fields=paperId,title,year,citationCount,authors`;
    const res = await fetch(url);
    if (!res.ok) return { data: [] };
    return res.json();
  } catch(e) { return { data: [] }; }
}

// ── Force-directed layout ──
function runForceLayout(iterations = 150) {
  const W = canvas.width;
  const H = canvas.height;
  const k = Math.sqrt((W * H) / (nodes.length || 1)) * 0.6;

  // Initialize positions if needed
  nodes.forEach(n => {
    if (!n.x) { n.x = W/2 + (Math.random()-0.5)*300; n.y = H/2 + (Math.random()-0.5)*300; }
    n.vx = 0; n.vy = 0;
  });

  for (let iter = 0; iter < iterations; iter++) {
    // Repulsion
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const force = (k*k) / dist;
        const fx = (dx/dist) * force * 0.1;
        const fy = (dy/dist) * force * 0.1;
        nodes[i].vx -= fx; nodes[i].vy -= fy;
        nodes[j].vx += fx; nodes[j].vy += fy;
      }
    }
    // Attraction along edges
    edges.forEach(e => {
      const src = nodes.find(n => n.id === e.source);
      const tgt = nodes.find(n => n.id === e.target);
      if (!src || !tgt) return;
      const dx = tgt.x - src.x;
      const dy = tgt.y - src.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const force = (dist*dist) / k * 0.05;
      const fx = (dx/dist) * force;
      const fy = (dy/dist) * force;
      src.vx += fx; src.vy += fy;
      tgt.vx -= fx; tgt.vy -= fy;
    });
    // Apply + dampen + bound
    nodes.forEach(n => {
      n.x = Math.max(50, Math.min(W-50, n.x + n.vx));
      n.y = Math.max(50, Math.min(H-50, n.y + n.vy));
      n.vx *= 0.85; n.vy *= 0.85;
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // Draw edges
  edges.forEach(e => {
    const src = nodes.find(n => n.id === e.source);
    const tgt = nodes.find(n => n.id === e.target);
    if (!src || !tgt) return;
    ctx.beginPath();
    ctx.moveTo(src.x, src.y);
    ctx.lineTo(tgt.x, tgt.y);
    ctx.strokeStyle = e.type === 'citation' ? 'rgba(0,136,255,0.25)' : 'rgba(0,229,255,0.15)';
    ctx.lineWidth = e.weight || 1;
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach(n => {
    const r = Math.max(8, Math.min(30, 8 + Math.log1p(n.citations || 0) * 2.5));
    const isHovered = n === hoveredNode;
    const color = n.isRoot ? '#00e5ff' : n.unchallenged ? '#ffcc00' : '#0088ff';

    // Glow
    if (isHovered || n.isRoot || n.unchallenged) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 8, 0, Math.PI*2);
      const grad = ctx.createRadialGradient(n.x, n.y, r, n.x, n.y, r+8);
      grad.addColorStop(0, color + '40');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = color + '22';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = isHovered ? 2 : 1;
    ctx.stroke();

    // Label
    if (scale > 0.5 || isHovered) {
      ctx.fillStyle = isHovered ? '#e0f4ff' : '#a0c8e0';
      ctx.font = `${Math.max(8, 10 * scale)}px JetBrains Mono`;
      ctx.textAlign = 'center';
      const label = (n.title || '').slice(0, 30) + (n.title?.length > 30 ? '...' : '');
      ctx.fillText(label, n.x, n.y + r + 14);
    }
  });

  ctx.restore();
}

// Mouse interactions
canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStart = { x: e.clientX - offsetX, y: e.clientY - offsetY };
});
canvas.addEventListener('mousemove', e => {
  if (dragging) {
    offsetX = e.clientX - dragStart.x;
    offsetY = e.clientY - dragStart.y;
    draw();
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left - offsetX) / scale;
  const my = (e.clientY - rect.top - offsetY) / scale;
  hoveredNode = nodes.find(n => {
    const r = Math.max(8, Math.min(30, 8 + Math.log1p(n.citations||0)*2.5));
    return Math.hypot(n.x-mx, n.y-my) < r+4;
  }) || null;
  const tooltip = document.getElementById('tooltip');
  if (hoveredNode) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 20) + 'px';
    tooltip.innerHTML = `<div class="tt-title">${hoveredNode.title?.slice(0,80)}</div><div class="tt-meta">Year: ${hoveredNode.year||'?'} | Citations: ${hoveredNode.citations||0} | ${hoveredNode.unchallenged?'⭐ UNCHALLENGED':''}</div>`;
  } else {
    tooltip.style.display = 'none';
  }
  draw();
});
canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  scale = Math.max(0.2, Math.min(3, scale * factor));
  draw();
}, { passive: false });

function resetZoom() { scale=1; offsetX=0; offsetY=0; draw(); }
function zoomIn() { scale=Math.min(3,scale*1.2); draw(); }
function zoomOut() { scale=Math.max(0.2,scale*0.8); draw(); }

// ── Build graph ──
async function buildGraph() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;
  const maxP = parseInt(document.getElementById('maxPapers').value);
  const depth = parseInt(document.getElementById('depthSelect').value);

  nodes = []; edges = [];
  document.getElementById('buildBtn').disabled = true;
  setLoading('QUERYING SEMANTIC SCHOLAR', 10);

  try {
    const results = await ssSearch(query, maxP);
    const papers = results.data || [];
    setLoading('BUILDING NODES', 30);

    // Add root papers
    papers.forEach((p, i) => {
      nodes.push({
        id: p.paperId,
        title: p.title,
        year: p.year,
        citations: p.citationCount || 0,
        references: p.referenceCount || 0,
        abstract: p.abstract,
        isRoot: true,
        unchallenged: false,
        x: canvas.width/2 + (Math.random()-0.5)*400,
        y: canvas.height/2 + (Math.random()-0.5)*400
      });
    });

    setLoading('FETCHING CITATION LINKS', 50);

    // Fetch references for top papers
    if (depth >= 2) {
      const topPapers = papers.slice(0, 8);
      for (let i=0; i<topPapers.length; i++) {
        const p = topPapers[i];
        setLoading(`FETCHING REFERENCES ${i+1}/${topPapers.length}`, 50 + (i/topPapers.length)*35);
        const refs = await ssGetReferences(p.paperId, 8);
        for (const ref of (refs.data||[])) {
          const refPaper = ref.citedPaper;
          if (!refPaper?.paperId) continue;
          if (!nodes.find(n=>n.id===refPaper.paperId)) {
            nodes.push({ id:refPaper.paperId, title:refPaper.title||'Unknown', year:refPaper.year, citations:refPaper.citationCount||0, isRoot:false, unchallenged:false, x:canvas.width/2+(Math.random()-.5)*500, y:canvas.height/2+(Math.random()-.5)*500 });
          }
          if (!edges.find(e=>e.source===p.paperId&&e.target===refPaper.paperId)) {
            edges.push({ source:p.paperId, target:refPaper.paperId, type:'reference', weight:1 });
          }
        }
        await new Promise(r=>setTimeout(r,300)); // rate limit
      }
    }

    setLoading('RUNNING FORCE LAYOUT', 88);
    await new Promise(r=>setTimeout(r,50));
    runForceLayout(200);

    setLoading('DONE', 100);
    renderPaperList(papers);
    findUnchallengedNodes();
    document.getElementById('graphStats').textContent = `Nodes: ${nodes.length} | Edges: ${edges.length}`;
    draw();

  } catch(e) {
    setLoading('ERROR: '+e.message, 100);
  }
  document.getElementById('buildBtn').disabled = false;
}

function renderPaperList(papers) {
  const list = document.getElementById('paperList');
  list.innerHTML = papers.map(p => {
    const citations = p.citationCount || 0;
    const badgeClass = citations > 100 ? 'high' : citations > 20 ? 'med' : 'low';
    const badgeText = citations > 100 ? 'HIGH IMPACT' : citations > 20 ? 'CITED' : 'RECENT';
    return `<div class="paper-item" onclick="focusNode('${p.paperId}')">
      <div class="pi-title">${(p.title||'').slice(0,70)}</div>
      <div class="pi-meta">${p.year||'?'} · ${citations} citations</div>
      <span class="pi-badge ${badgeClass}">${badgeText}</span>
    </div>`;
  }).join('');
}

function focusNode(id) {
  const node = nodes.find(n=>n.id===id);
  if (!node) return;
  const W=canvas.width, H=canvas.height;
  offsetX = W/2 - node.x*scale;
  offsetY = H/2 - node.y*scale;
  hoveredNode = node;
  draw();
}

function findUnchallengedNodes() {
  // Mark nodes with high citations but no incoming reference edges as "unchallenged"
  const cited = new Set(edges.map(e=>e.target));
  nodes.forEach(n => {
    n.unchallenged = n.citations > 30 && !cited.has(n.id) && n.isRoot;
  });
  const unchallenged = nodes.filter(n=>n.unchallenged).sort((a,b)=>b.citations-a.citations).slice(0,5);
  const insightList = document.getElementById('insightList');
  insightList.innerHTML = unchallenged.length ? unchallenged.map(n=>`
    <div class="ib-item">
      <span class="ib-score">${n.citations} citations</span> — ${(n.title||'').slice(0,55)}...
    </div>
  `).join('') : '<div class="ib-item" style="color:#234;">Build graph first</div>';
}

function findUnchallenged() {
  if (!nodes.length) { alert('Build the graph first'); return; }
  findUnchallengedNodes();
  // Highlight on graph
  draw();
  const tip = document.getElementById('tooltip');
  tip.style.display='block';
  tip.style.left='50%';tip.style.top='80px';
  tip.innerHTML='<div class="tt-title">⭐ Yellow nodes = High-impact unchallenged claims</div>';
  setTimeout(()=>tip.style.display='none', 3000);
}

setLoading('READY — BUILD A GRAPH TO BEGIN', 100);
</script>
</body>
</html>
