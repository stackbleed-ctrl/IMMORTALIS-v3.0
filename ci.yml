name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check index.js syntax
        run: node --check index.js

      - name: Validate index.html exists and is non-empty
        run: |
          if [ ! -f index.html ] || [ ! -s index.html ]; then
            echo "index.html missing or empty"
            exit 1
          fi
          echo "index.html: $(wc -c < index.html) bytes"

      - name: Start server and health check
        run: |
          node index.js &
          SERVER_PID=$!
          sleep 2
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          kill $SERVER_PID
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Server health check failed: HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Server health check passed: HTTP $HTTP_STATUS"

      - name: Test /api/stats endpoint
        run: |
          node index.js &
          SERVER_PID=$!
          sleep 2
          STATS=$(curl -s http://localhost:3000/api/stats)
          kill $SERVER_PID
          echo "Stats response: $STATS"
          echo "$STATS" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); if(typeof d.lev !== 'number') throw new Error('lev missing'); console.log('API OK');"

      - name: Docker build (no push)
        run: docker build -t immortalis:ci .
